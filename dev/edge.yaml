# Dev config — edge agent.
#
# Run with:   make run-edge
# Or direct:  cargo run --bin agent -- run --config dev/edge.yaml --http 127.0.0.1:8082

role: edge
database:
  path: dev/edge.db
log:
  filter: info,agent=debug,extensions_host=debug
blocks:
  dir: dev/edge-blocks
fleet:
  backend: zenoh
  listen: []
  connect: ["tcp/127.0.0.1:17447"]
  tenant: sys
  agent_id: edge-1
