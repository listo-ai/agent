# This plugin crate is intentionally OUTSIDE the main workspace —
# it compiles to `wasm32-unknown-unknown`, which would force workspace-
# wide target gating if it were a member. Build it on its own:
#
#   cd plugins/com.acme.wasm-demo
#   cargo build --target wasm32-unknown-unknown --release
#   mkdir -p dist
#   cp target/wasm32-unknown-unknown/release/acme_wasm_demo.wasm dist/plugin.wasm
#
# See README.md for one-command builds via the Makefile target.
[package]
name = "acme-wasm-demo"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
# `cdylib` → wasmtime can load the resulting `.wasm` directly.
crate-type = ["cdylib"]

[dependencies]
# Path dep into the main workspace's SDK. `no-default-features` so
# we don't pull in the `native` runtime — wasm plugins need only the
# guest-side `wasm` surface.
extensions-sdk = { path = "../../crates/extensions-sdk", default-features = false, features = ["wasm"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
# Plugins live on the edge; shave every byte we can.
opt-level = "s"
lto = true
codegen-units = 1
strip = true
