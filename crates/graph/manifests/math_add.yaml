id: sys.compute.math.add
display_name: Add
facets:
  - isCompute
containment:
  must_live_under: []
  may_contain: []
  cardinality_per_parent: many_per_parent
  cascade: strict
slots:
  - name: a
    role: input
    value_schema:
      type: number
    writable: false
  - name: b
    role: input
    value_schema:
      type: number
    writable: false
  - name: sum
    role: output
    # Msg envelope mirror of domain-compute counterpart.
    value_schema:
      type: object
      properties:
        _msgid:
          type: string
        topic:
          type: string
        payload:
          type: number
      required: [payload, _msgid]
    writable: false
  # Internal cross-message memory — see domain-compute counterpart.
  # `last_sum` deleted in Stage 7 (NODE-RED-MODEL.md); the `sum` output
  # slot is the latest value.
  - name: last_a
    role: status
    value_schema:
      type: number
      nullable: true
    is_internal: true
  - name: last_b
    role: status
    value_schema:
      type: number
      nullable: true
    is_internal: true
