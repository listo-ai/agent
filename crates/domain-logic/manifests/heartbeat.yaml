id: sys.logic.heartbeat
display_name: Heartbeat
facets:
  - isCompute
containment:
  must_live_under: []
  may_contain: []
  cardinality_per_parent: many_per_parent
  cascade: strict
slots:
  - name: out
    role: output
    # Describes the Msg envelope that lands on the slot (Stage 4 of
    # NODE-RED-MODEL.md): the whole `Msg` is stored, not just the
    # payload. Studio surfaces use this schema to suggest history
    # paths without requiring a runtime emit first.
    value_schema:
      type: object
      properties:
        _msgid:
          type: string
        topic:
          type: string
        payload:
          type: object
          properties:
            state:
              type: boolean
            count:
              type: integer
              minimum: 0
          required: [state, count]
      required: [payload, _msgid]
    writable: false
    emit_on_init: true
  - name: pending_timer
    role: status
    value_schema:
      type:
        - integer
        - "null"
    writable: true
    is_internal: true
trigger_policy: on_any
settings_schema:
  type: object
  title: Heartbeat settings
  description: Emits an alternating boolean on a timer. No inputs — drives itself.
  properties:
    interval_ms:
      type: integer
      title: Interval (ms)
      description: "Milliseconds between toggles. 1000 = 1s, 60000 = 1min, 120000 = 2min."
      default: 1000
      minimum: 10
      maximum: 3600000
      examples: [500, 1000, 5000, 60000, 300000]
    start_state:
      type: boolean
      title: Start state
      description: First value emitted at on_init. The next tick flips it.
      default: false
    enabled:
      type: boolean
      title: Enabled
      description: If false, the heartbeat pauses (no timer armed). Counter preserved.
      default: true
  additionalProperties: false
views:
  - id: overview
    title: Heartbeat overview
    priority: 100
    template:
      ir_version: 1
      root:
        type: page
        id: hb-overview
        title: "{{$target.name}}"
        children:
          - type: row
            id: hdr
            children:
              - type: heading
                id: h
                content: "{{$target.path}}"
                level: 2
              - type: badge
                id: state
                label: "{{$target.out.payload.state}}"
                intent: info
          - type: row
            id: kpis
            children:
              - type: badge
                id: count
                label: "count: {{$target.out.payload.count}}"
                intent: info
