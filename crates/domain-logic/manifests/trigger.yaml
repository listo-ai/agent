id: sys.logic.trigger
display_name: Trigger
facets:
  - isCompute
containment:
  must_live_under: []
  may_contain: []
  cardinality_per_parent: many_per_parent
  cascade: strict
slots:
  - name: in
    role: input
    value_schema: {}
    writable: true
    trigger: true
  - name: reset
    role: input
    value_schema: {}
    writable: true
    trigger: true
  - name: out
    role: output
    # Msg envelope emitted on every trigger (and on reset if
    # reset_payload is non-null). The payload is user-configured
    # (settings: trigger_payload / reset_payload) so no narrow type —
    # any JSON value. Studio history suggestions will offer `payload`
    # as a json snapshot; type-specific historization is an explicit
    # author choice on the paths editor.
    value_schema:
      type: object
      properties:
        _msgid:
          type: string
        topic:
          type: string
        payload: {}
      required: [_msgid]
    writable: false
  - name: armed
    role: status
    value_schema:
      type: boolean
    writable: true
  - name: pending_timer
    role: status
    value_schema:
      type:
        - integer
        - "null"
    writable: true
    is_internal: true
trigger_policy: on_any
settings_schema:
  type: object
  properties:
    mode:
      type: string
      enum:
        - once
        - extend
        - manual_reset
      default: once
    trigger_payload:
      default: true
    reset_payload:
      default: null
    delay_ms:
      type: integer
      default: 0
msg_overrides:
  delay_ms: delay
  trigger_payload: trigger
  reset_payload: reset_value
