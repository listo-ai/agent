id: sys.compute.math.add
display_name: Add
facets:
  - isCompute
containment:
  must_live_under: []
  may_contain: []
  cardinality_per_parent: many_per_parent
  cascade: strict
slots:
  - name: a
    role: input
    value_schema:
      type: number
    writable: false
  - name: b
    role: input
    value_schema:
      type: number
    writable: false
  - name: sum
    role: output
    value_schema:
      type: number
    writable: false
  # Status mirrors so the property panel / queries can see the last
  # inputs used to produce `sum` without subscribing to the wire. Also
  # serve as the behaviour's cross-message memory: sum emits when both
  # last_a and last_b have been observed at least once.
  - name: last_a
    role: status
    value_schema:
      type: number
      nullable: true
  - name: last_b
    role: status
    value_schema:
      type: number
      nullable: true
  - name: last_sum
    role: status
    value_schema:
      type: number
      nullable: true
