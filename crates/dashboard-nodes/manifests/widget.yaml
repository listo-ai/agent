id: ui.widget
display_name: Widget
facets: []
containment:
  must_live_under:
    - kind: ui.page
    - kind: ui.template
  may_contain: []
  cardinality_per_parent: many_per_parent
  cascade: strict
slots:
  - name: widget_type
    role: config
    value_schema:
      type: string
      description: Extension-registered widget type id.
    writable: true
  - name: bindings
    role: config
    value_schema:
      type: object
      description: >
        Map binding-name -> expression string. Expressions reference
        $stack.<alias>, $stack[i], $self.<slot>, $user.<claim>, $page.<name>.
      additionalProperties:
        type: string
    writable: true
  - name: layout_hint
    role: config
    value_schema:
      type: ["object", "null"]
      description: Renderer-specific placement hint (grid cell, size, etc.).
    writable: true
