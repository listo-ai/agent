id: ui.template
display_name: Page template
facets:
  - isContainer
containment:
  must_live_under: []
  may_contain:
    - kind: ui.widget
  cardinality_per_parent: many_per_parent
  cascade: strict
slots:
  - name: title
    role: config
    value_schema:
      type: string
    writable: true
  - name: requires
    role: config
    value_schema:
      type: object
      description: >
        Parameter contract. Map from hole-name to { type, required?, default? }.
        Types: "ref" | "string" | "number" | "bool". A page binding this template
        must supply every required hole with a matching type.
      additionalProperties:
        type: object
        properties:
          type:
            type: string
            enum: [ref, string, number, bool]
          required:
            type: boolean
            default: true
          default: {}
        required: [type]
    writable: true
  - name: layout
    role: config
    value_schema:
      type: object
      description: Opaque layout JSON. References child ui.widget nodes by id.
    writable: true
