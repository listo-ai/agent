id: ui.page
display_name: Page
facets:
  - isContainer
containment:
  must_live_under: []
  may_contain: []
  cardinality_per_parent: many_per_parent
  cascade: strict
slots:
  - name: title
    role: config
    value_schema:
      type: string
    writable: true
  - name: layout
    role: config
    value_schema:
      type: ["object", "null"]
      description: Typed SDUI ComponentTree — { ir_version, root }. See docs/design/SDUI.md.
    writable: true
  - name: page_state_schema
    role: config
    value_schema:
      type: ["object", "null"]
      description: JSON Schema for $page state validated at /ui/resolve.
    writable: true
