id: sys.fleet.group
display_name: Fleet Group
# isContainer so station's blanket `may_contain: [facet: isContainer]`
# accepts fleet groups without amending the station manifest.
facets:
  - isSystem
  - isContainer
containment:
  must_live_under:
    - kind: sys.core.station
    - kind: sys.core.folder
    - kind: sys.fleet.group
  may_contain:
    - kind: sys.fleet.remote-agent
    - kind: sys.fleet.group
  cardinality_per_parent: many_per_parent
  cascade: strict
slots:
  - name: display_name
    role: config
    value_schema:
      type: string
    writable: true
