[package]
name = "agent"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lints]
workspace = true

[[bin]]
name = "agent"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Pull in substrate crates so the dependency graph is expressed from day one.
# These are stubs in Stage 0 — the agent wires them together in later stages.
spi = { workspace = true }
messaging = { workspace = true }
graph = { workspace = true }
engine = { workspace = true }

[features]
default = ["role-standalone"]
role-edge = []
role-cloud = []
role-standalone = ["role-edge", "role-cloud"]
mcp = []
