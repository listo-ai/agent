id: com.acme.hello
version: 0.1.0
display_name: "Hello block"
description: "Reference block — the full shape: Module-Federation UI bundle + a Wasm node kind (`greeter`)."

contributes:
  ui:
    entry: ui/remoteEntry.js
    exposes:
      - name: Panel
        module: "./Panel"
        contributes_to: sidebar
  # Wasm module produced by this block's Rust crate (see src/lib.rs).
  # Path is relative to the block dir; build with:
  #   cargo build --target wasm32-unknown-unknown --release
  #   cp target/wasm32-unknown-unknown/release/acme_hello.wasm dist/block.wasm
  wasm_modules:
    - path: dist/block.wasm
  kinds: []

requires:
  - id: spi.msg
    version: "^1"
