agents:
  - name: gemini
    path: ".mcp.json"
    format: "standard"
  - name: vscode
    path: ".vscode/settings.json"
    format: "vscode"
  - name: claude
    path: "~/.config/Claude/claude_desktop_config.json"
    format: "standard"
  - name: cursor
    path: ".cursor/mcp.json"
    format: "standard"

servers:
  shadcn:
    command: "pnpm"
    args: ["dlx", "shadcn@latest", "mcp"]
  puppeteer:
    command: "pnpm"
    args: ["dlx", "@modelcontextprotocol/server-puppeteer"]
